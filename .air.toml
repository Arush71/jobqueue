root = "."
tmp_dir = "tmp"

[build]
  # 🔥 IMPORTANT: point to your cmd/server
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"

  # debounce (prevents spam rebuilds)
  delay = 1000

  # file watching
  include_ext = ["go", "tpl", "tmpl", "html"]

  # ignore useless stuff
  exclude_dir = ["tmp", "vendor", "testdata", ".git", "node_modules"]

  # ignore test files
  exclude_regex = ["_test.go"]

  # logging
  log = "build-errors.log"

  # behavior
  stop_on_error = true
  kill_delay = "0s"

[color]
  build = "yellow"
  runner = "green"

[log]
  time = true

[screen]
  clear_on_rebuild = true
